<!-- ═══════════════════════════════ CONNECTION LINES ══════════════════════════ -->
<!-- Draw ALL arrows AFTER all boxes so they appear on top cleanly -->

<!-- 1. User ↔ Orchestrator -->
<line x1="108" y1="299" x2="146" y2="299" stroke="#475569" stroke-width="1.5"
  marker-end="url(#arr-slate)" marker-start="url(#arr-slate-rev)"/>
<text x="127" y="291" text-anchor="middle" font-size="8" fill="#475569">POST /chat</text>
<text x="127" y="311" text-anchor="middle" font-size="8" fill="#475569">response</text>

<!-- 2. Orchestrator → Hotels (elbow: right then up to y=115) -->
<path d="M302,272 L317,272 L317,115 L346,115" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>

<!-- 3. Orchestrator → Transport (straight right) -->
<line x1="302" y1="299" x2="346" y2="271" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>

<!-- 4. Orchestrator → Policy (elbow: right then down to y=429) -->
<path d="M302,318 L317,318 L317,429 L346,429" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>

<!-- 5. Hotels → holiday_db (straight right) -->
<line x1="682" y1="115" x2="756" y2="155" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>

<!-- 6. Transport → holiday_db (elbow going up cleanly) -->
<path d="M682,271 L720,271 L720,200 L756,200" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>

<!-- 7. Policy → holiday_db (elbow right then up) -->
<path d="M682,429 L726,429 L726,240 L756,240" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>

<!-- read/write label -->
<text x="722" y="155" font-size="8.5" fill="#22c55e" font-weight="500">read / write</text>

<!-- ─── MEMORY ARROWS ─── routed entirely outside the agent zone ───────────── -->

<!-- 8. Long-term memory: Orchestrator → agent_memory
     Route: UP from orchestrator top → along top rail (y=14) → down into agent_memory top
     This stays completely ABOVE everything -->
<path d="M224,220 L224,14 L894,14 L894,318" fill="none"
  stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,3"
  marker-end="url(#arr-purple)"/>
<!-- Label on top rail -->
<rect x="474" y="5" width="124" height="16" rx="8" fill="#1e0a3c"/>
<text x="536" y="16" text-anchor="middle" font-size="8.5" fill="#a855f7" font-weight="600">long-term memory</text>

<!-- 9. short-term memory: Agents → agent_memory
     Route: from right edge of agent zone (x=716) → straight right, bridged between the two DBs -->
<path d="M716,300 L730,300 L730,433 L756,433" fill="none"
  stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,3"
  marker-end="url(#arr-purple)"/>
<rect x="700" y="304" width="56" height="14" rx="7" fill="#1e0a3c"/>
<text x="728" y="314" text-anchor="middle" font-size="8" fill="#a855f7" font-weight="500">short-term</text>

