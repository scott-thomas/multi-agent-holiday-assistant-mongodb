<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" width="1100" height="640"
     font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

<defs>
  <!-- Subtle card shadow -->
  <filter id="card" x="-6%" y="-6%" width="112%" height="124%">
    <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#00000010"/>
    <feDropShadow dx="0" dy="3" stdDeviation="6"   flood-color="#0000000a"/>
  </filter>
  <filter id="zone" x="-3%" y="-3%" width="106%" height="110%">
    <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#0000000a"/>
  </filter>

  <!-- Arrow markers -->
  <marker id="ag" markerWidth="8" markerHeight="8" refX="6" refY="3.5" orient="auto">
    <path d="M0,1 L0,6 L7,3.5 Z" fill="#16a34a"/>
  </marker>
  <marker id="ap" markerWidth="8" markerHeight="8" refX="6" refY="3.5" orient="auto">
    <path d="M0,1 L0,6 L7,3.5 Z" fill="#8b5cf6"/>
  </marker>
  <marker id="as" markerWidth="8" markerHeight="8" refX="6" refY="3.5" orient="auto">
    <path d="M0,1 L0,6 L7,3.5 Z" fill="#94a3b8"/>
  </marker>
  <marker id="asr" markerWidth="8" markerHeight="8" refX="1" refY="3.5" orient="auto-start-reverse">
    <path d="M7,1 L7,6 L0,3.5 Z" fill="#94a3b8"/>
  </marker>

  <!-- Clip for rounded pill icon -->
  <clipPath id="pill-clip"><rect width="20" height="20" rx="4"/></clipPath>
</defs>

<!-- ═══ BACKGROUND ═══ -->
<rect width="1100" height="640" rx="18" fill="#f8fafc"/>

<!-- Faint dot grid -->
<pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
  <circle cx="12" cy="12" r="0.9" fill="#cbd5e1" opacity="0.6"/>
</pattern>
<rect width="1100" height="640" rx="18" fill="url(#dots)"/>

<!-- ═══ ZONE: LangGraph Agents ═══ -->
<rect x="334" y="36" width="358" height="556" rx="14"
