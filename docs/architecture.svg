<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" width="1080" height="620" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; }
  </style>

  <!-- Shadows -->
  <filter id="s1" x="-8%" y="-8%" width="116%" height="130%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000022"/>
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000014"/>
  </filter>
  <filter id="s2" x="-4%" y="-4%" width="108%" height="118%">
    <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00000030"/>
  </filter>

  <!-- Gradients -->
  <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0f1117"/>
    <stop offset="100%" stop-color="#141820"/>
  </linearGradient>
  <linearGradient id="orch-grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1e2230"/>
    <stop offset="100%" stop-color="#181c28"/>
  </linearGradient>
  <linearGradient id="agent-zone-grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1a2235"/>
    <stop offset="100%" stop-color="#141c2e"/>
  </linearGradient>
  <linearGradient id="mongo-zone-grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0f1f14"/>
    <stop offset="100%" stop-color="#0a1810"/>
  </linearGradient>
  <linearGradient id="mongo-mem-grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1a1030"/>
    <stop offset="100%" stop-color="#140d26"/>
  </linearGradient>

  <!-- Arrow markers -->
  <marker id="arr-green" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
    <path d="M0,0.5 L0,5.5 L6,3 Z" fill="#22c55e"/>
  </marker>
  <marker id="arr-purple" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
    <path d="M0,0.5 L0,5.5 L6,3 Z" fill="#a855f7"/>
  </marker>
  <marker id="arr-slate" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
    <path d="M0,0.5 L0,5.5 L6,3 Z" fill="#64748b"/>
  </marker>
  <marker id="arr-slate-rev" markerWidth="7" markerHeight="7" refX="1" refY="3" orient="auto-start-reverse">
    <path d="M0,0.5 L0,5.5 L6,3 Z" fill="#64748b"/>
  </marker>
</defs>

<!-- ═══════════════════════════════ BACKGROUND ═══════════════════════════════ -->
<rect width="1080" height="620" rx="16" fill="url(#bg-grad)"/>

<!-- Subtle grid texture -->
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
  <path d="M40,0 L0,0 L0,40" fill="none" stroke="#ffffff06" stroke-width="1"/>
</pattern>
<rect width="1080" height="620" rx="16" fill="url(#grid)"/>

